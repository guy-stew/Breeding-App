<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Whelpwise">
  <title>Whelpwise</title>
  <style>
    .bg { fill: #eafaf0; }
    .fg { stroke: #15a34a; }
    .dot { fill: #15a34a; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #14271c; }
      .fg { stroke: #4ade80; }
      .dot { fill: #4ade80; }
    }
  </style>
  <rect class="bg" x="0" y="0" width="64" height="64" rx="14"/>
  <g transform="translate(32,27)">
    <circle class="fg" cx="0" cy="0" r="15" fill="none" stroke-width="4.5"/>
    <circle class="dot" cx="0" cy="15" r="3.6"/>
  </g>
</svg>
