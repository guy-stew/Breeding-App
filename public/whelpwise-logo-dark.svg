  </g>
  <!-- Wordmark -->
  <text x="104" y="58" font-family="'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="500" fill="#f5f5f5">whelp<tspan fill="#4ade80">wise</tspan></text>
  <!-- Strapline -->
